# DAWN-SRW v4.1.5.6 400M stability-patched config
# Uses checkpoint-compatible code changes: no new parameters.
# Optional stronger safety if tau_offset max still spikes: add training.tau_offset_clip: 6.0

seed: 1
data:
  bin_train: gs://dawn-tpu-data-c4/c4_train_40B
  bin_val: gs://dawn-tpu-data-c4/c4_val.bin
  max_train_tokens: 40000000000
  max_val_tokens: 10000000
  local_cache_dir: /tmp/data
model:
  model_version: spatial-r1-v4.1.5.6
  d_model: 2304
  n_layers: 18
  n_heads: 36
  max_seq_len: 512
  dropout: 0.0
  gradient_checkpointing: true
  d_route: 256
  n_qk: 2330
  n_v: 14640
  n_know: 29130
  router_dropout: 0.02
training:
  batch_size: 1024
  mesh_model: 2
  mesh_data: 16
  n_chunks_qk: 1
  n_chunks_v: 1
  n_chunks_know: 4
  gradient_accumulation_steps: 1
  num_epochs: 1
  lr: 0.0003
  weight_decay: 0.1
  pool_weight_decay: 0.02
  warmup_ratio: 0.08
  diversity_weight: 0.1
  load_balance_weight: 0.0
  sharpness: 500.0
  activation_threshold: 0.5
  activation_cutoff: 0.01
  epsilon: 0.0001
  max_intensity: 10.0
  scan_scale: 0.01
  scan_std_floor: 0.5
  dead_penalty_weight: 0.05
  dead_penalty_threshold: 0.01
  exploration_weight: 0.001
  exploration_asymmetry: 5.0
  exploration_warmup_steps: 1000
  exploration_lower_bound: -0.5
  exploration_upper_bound: 2.0
  exploration_bound_eps: 0.001
  checkpoint_interval: 200
  val_interval: 200
  log_interval: 100
  log_analysis_multiplier: 10
  heavy_geometry_multiplier: 10
  restore_training_config_on_resume: false
  tau_lr_mult: 0.1
  tau_grad_clip: 0.1
  exploration_dev_mode: bounded_z
  exploration_ce_clip_std: 2.0
  exploration_z_clip: 2.0
  exploration_z_tanh: true
  exploration_weighted_clip: 0.05
  dead_penalty_weighted_clip: 0.5
use_amp: true
checkpoint_dir: gs://dawn-tpu-data-c4/checkpoints/dawn_srw_400M_c4_40B_v4_64_dmodel_v4156
log_dir: gs://dawn-tpu-data-c4/logs/dawn_srw_400M_c4_40B_v4_64_dmodel_v4156
