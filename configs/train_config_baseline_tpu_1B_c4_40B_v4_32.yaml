# Vanilla Transformer Baseline — TPU Training Config, 1B Scale, v4-32 Pod
# Parameter-matched: d_model=2048, n_layers=18, d_ff=8192 ≈ 1.01B params
# Global batch: 512 × acc 4 = effective 2048 (matches v4-128)
# Checkpoint compatible with v4-128 config for seamless migration

seed: 1

data:
  bin_train: gs://dawn-tpu-data-c4/c4_train_40B
  bin_val: gs://dawn-tpu-data-c4/c4_val.bin
  max_train_tokens: 40000000000
  max_val_tokens: 10000000
  local_cache_dir: /tmp/data

model:
  model_version: "baseline"
  d_model: 2048
  d_ff: 8192
  n_layers: 18
  n_heads: 16
  max_seq_len: 512
  dropout: 0.1
  gradient_checkpointing: true

training:
  batch_size: 512
  gradient_accumulation_steps: 4
  num_epochs: 1
  lr: 0.0003
  weight_decay: 0.1
  warmup_ratio: 0.06
  orthogonality_weight: 0.0
  diversity_weight: 0.0
  load_balance_weight: 0.0
  entropy_weight: 0.0
  process_norm_weight: 0.0
  checkpoint_interval: 200
  val_interval: 200

use_amp: true
checkpoint_dir: gs://dawn-tpu-data-c4/checkpoints/baseline_1B_c4_40B
log_dir: gs://dawn-tpu-data-c4/logs/baseline_1B_c4_40B
