# DAWN-SRW -- d_route-only tag routing
#
# Sister of train_config_spatial_r1_v4_1_40M_c4_5B.yaml.
# train_jax.py maps model_version: "spatial-r1-v4.1.5.7" to:
#   models/dawn_srw.py
#
# This keeps the baseline v4.1 training hyperparameters fixed while using
# the d_route-only route convention:
#   scan = scan_scale * tanh(scan_bias)
#   tau = s_mean + tau_offset * s_std - scan / max(s_std, scan_std_floor)
#
# v4.1.5.5 train_jax default:
#   route_width=d_route
#
# Route interpretation:
#   h supplies token/context magnitude and direction;
#   route keeps learned tag norm as the routing degree of freedom.
#
# Only d_route is configured here; train_jax derives the internal split.
# ============================================================

seed: 1

data:
  bin_train: gs://dawn-tpu-data-c4/c4_train_40B
  bin_val: gs://dawn-tpu-data-c4/c4_val.bin
  max_train_tokens: 5000000000
  max_val_tokens: 10000000
  local_cache_dir: /tmp/data

model:
  model_version: "spatial-r1-v4.1.5.7"
  d_model: 432
  n_layers: 12
  n_heads: 6
  max_seq_len: 512
  # Mild residual/attn dropout -- helps break co-adaptation without
  # drowning the signal. 40M@5B has no overfit pressure.
  dropout: 0.0
  gradient_checkpointing: true

  d_route: 128
  n_qk:   1240
  n_v:    7830
  n_know: 15570
  # h-level dropout. Scores = h . emb, so dropping h dims is
  # equivalent to stochastically dimming all neuron scores along
  # that axis -- horizontal search (area-shift) complement to
  # tau's vertical search (water-level).
  router_dropout: 0.0   # v4156 stability carryover: deterministic routing/control

training:
  batch_size: 128
  gradient_accumulation_steps: 1
  num_epochs: 1
  # When resuming with stability keys, keep the YAML settings below instead of
  # letting older checkpoint-saved training config overwrite them.
  restore_training_config_on_resume: false
  lr: 0.00065
  weight_decay: 0.1
  pool_weight_decay: 0.02    # v4.1.5.5 decays emb and raw read/write operator norms
  warmup_ratio: 0.06
  diversity_weight: 0.1
  load_balance_weight: 0.0

  # ---- v4.1.5.7 directional select + state_sharpness ----
  # direction_match = normalize(h) @ normalize(emb).T
  # raw_margin = direction_match - tau
  # scaled_margin = state_sharpness * raw_margin
  # selection_margin = scaled_margin - activation_threshold
  # gate = sigmoid(sharpness * selection_margin)
  # RW execution strength is handled by <x, r_i> w_i; route intensity is disabled.
  sharpness: 500.0
  activation_threshold: 0.05
  activation_cutoff: 0.01
  epsilon: 1.0e-4
  max_intensity: 1.0
  use_direction_routing: true
  use_route_intensity: false
  state_sharpness_range_min: 1.25
  state_sharpness_range_max: 4.0
  scan_scale: 0.01
  scan_std_floor: 0.5

  # ---- Dead-only penalty ----
  dead_penalty_weight: 0.05
  dead_penalty_threshold: 0.01

  # ---- Explore loss (v4.1+ per-token bound) ----
  # Baseline = per-batch global-mean CE (no EMA, stateless, zero-sum).
  # Signal = asymmetric deviation from baseline.
  # Bounds apply per-element (per-token x per-layer x per-route):
  #   tau <= LOWER + BOUND_EPS  AND  signal > 0  ->  off
  #   tau >= UPPER - BOUND_EPS  AND  signal < 0  ->  off
  #   otherwise                                  ->  normal signal
  # tau itself is NOT clipped -- only the explore loss is bounded.
  # CE can push tau outside the bounds if it really needs to.
  exploration_weight: 0.001        # lambda: overall strength
  exploration_asymmetry: 10.0       # easy-token push scale (symmetric=1.0)
  exploration_warmup_steps: 1000   # loss off until this step
  exploration_lower_bound: -0.5    # down-push bound
  exploration_upper_bound: 2.0     # up-push bound
  exploration_bound_eps: 1.0e-3    # tolerance near bounds

  # ---- v4.1.5.5 stability patch: same controller/aux stabilization used for v4.1.5.6 ----
  # These add no model parameters; old checkpoints remain compatible.
  tau_lr_mult: 0.1
  tau_grad_clip: 0.1
  router_scan_lr_mult: 0.10
  router_scan_grad_clip: 0.10
  # v4.1.5.7 normalizes routing in forward, so projection/embedding can receive full signal.
  router_proj_lr_mult: 1.0
  router_proj_grad_clip: 1.00
  route_emb_lr_mult: 1.0
  route_emb_grad_clip: 1.00
  route_emb_forward_norm: false
  exploration_dev_mode: bounded_z
  exploration_ce_clip_std: 2.0
  exploration_z_clip: 3.0
  exploration_z_tanh: true
  exploration_weighted_clip: 0.5
  dead_penalty_weighted_clip: 0.5
  # Optional forward-time safety clamp for router-produced tau offsets.
  # Keep at 0.0 for exact unclipped v4.1.5.5 behavior; set 6.0 only if tau max outliers reappear.
  tau_offset_clip: 0.0

  # ---- v4156 diagnostic / crash replay carryover ----
  # Top1, active_frac, layer_out and dead_spike are diagnostic-only.
  # Stop only on CE/grad/loss-minus-CE/nonfinite severe signals.
  debug_local_spikes: true
  debug_drop_compare: false
  crash_snapshot_enabled: true
  stop_on_collapse: true
  crash_snapshot_save_post: false
  crash_history_steps: 6
  crash_snapshot_save_host_batches: true
  collapse_grad_threshold: 100.0
  collapse_ce_extreme_threshold: 50.0
  collapse_ce_grad_ce_threshold: 6.0
  collapse_ce_grad_grad_threshold: 5.0
  collapse_loss_minus_ce_threshold: 10.0

  n_chunks_know: 1
  n_chunks_qk: 1
  n_chunks_v: 1
  checkpoint_interval: 500
  val_interval: 500
  # ---- 2-tier log cadence (step units) ----
  log_interval: 100
  log_analysis_multiplier: 5
  heavy_geometry_multiplier: 10

use_amp: true
checkpoint_dir: gs://dawn-tpu-data-c4/checkpoints/dawn_srw_v4157_40M_c4_5B_dmodel_v2_more_ex10more_max100
log_dir: gs://dawn-tpu-data-c4/logs/dawn_srw_v4157_40M_c4_5B_dmodel_v2_more_ex10more_max100
