# DAWN-SRW v4.1.5.9 400M clean config — 40M-aligned training knobs
#
# Policy:
#   - Keep 400M-specific model shape, data scale, TPU mesh, batch, and chunking.
#   - Match 40M clean stability-test learning knobs: LR, warmup, tau init,
#     tau LR multiplier, auxiliary losses, exploration, and logging cadence.
#   - Remove unused/legacy config keys not read by the current v4159 code path.

seed: 1

# -----------------------------------------------------------------------------
# Data
# -----------------------------------------------------------------------------
data:
  bin_train: gs://dawn-tpu-data-c4/c4_train_40B
  bin_val: gs://dawn-tpu-data-c4/c4_val.bin
  max_train_tokens: 40000000000
  max_val_tokens: 10000000
  local_cache_dir: /tmp/data

# -----------------------------------------------------------------------------
# Model shape / capacity
# -----------------------------------------------------------------------------
model:
  model_version: spatial-r1-v4.1.5.9

  # Transformer-scale backbone
  d_model: 2304
  n_layers: 18
  n_heads: 36
  max_seq_len: 512

  # Route split
  d_route: 256
  d_select: 192        # remaining 64 dims are split into intensity

  # Shared SRW pools
  n_qk: 2330
  n_v: 14640
  n_know: 29130

  # Execution / regularization
  dropout: 0.0
  router_dropout: 0.0
  gradient_checkpointing: true

# -----------------------------------------------------------------------------
# Training
# -----------------------------------------------------------------------------
training:
  # Batch / TPU layout / schedule
  batch_size: 1024
  mesh_model: 2
  mesh_data: 16
  gradient_accumulation_steps: 1
  restore_training_config_on_resume: false
  num_epochs: 1

  # Optimizer — matched to 40M clean config
  lr: 0.0003
  warmup_ratio: 0.08
  weight_decay: 0.1
  pool_weight_decay: 0.02
  tau_lr_mult: 0.1    # conservative tau updates only; other LR paths use defaults
  tau_grad_clip: 1.0
  router_proj_grad_clip: 2.0

  # Angular Select / Intensity
  tau_min: 0.0
  intensity_beta: 0.5

  # Tau initialization / scan — matched to 40M clean config
  tau_offset_init_attn_qk: -0.5
  tau_offset_init_attn_v: 1.0
  tau_offset_init_rst: 1.5
  scan_scale: 0.0
  scan_std_floor: 0.5

  # Auxiliary losses — matched to 40M clean config
  diversity_weight: 0.1
  load_balance_weight: 0.0
  dead_penalty_weight: 0.005
  dead_exposure_target: 0.1

  # Exploration / RPE feedback — matched to 40M clean config
  exploration_weight: 0.001
  exploration_asymmetry: 3.0
  exploration_warmup_steps: 0
  exploration_lower_bound: -0.5
  exploration_upper_bound: 2.0
  exploration_bound_eps: 0.001

  # Chunking — 400M-specific memory/mesh setting
  n_chunks_qk: 1
  n_chunks_v: 1
  n_chunks_know: 4

  # Logging / diagnostics / checkpoints — matched to 40M clean config
  checkpoint_interval: 200
  val_interval: 1000
  log_interval: 100
  log_analysis_multiplier: 10
  heavy_geometry_multiplier: 10

checkpoint_dir: gs://dawn-tpu-data-c4/checkpoints/dawn_srw_v4159_400M_c4_40B_v4_64
