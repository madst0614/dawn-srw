# DAWN Spatial-R1 Training Config - 40M Scale, 5B tokens (TPU)
# Rank-1 neuron: each neuron is a single [D] vector
# Transform: out = V^T diag(gate) V x
# Gate: learnable tau threshold (v18.5 style)

seed: 1

data:
  bin_train: gs://dawn-tpu-data-c4/c4_train
  bin_val: gs://dawn-tpu-data-c4/c4_val.bin
  max_train_tokens: 5000000000
  max_val_tokens: 10000000
  local_cache_dir: /tmp/data

model:
  model_version: "spatial-r1"
  d_model: 384
  n_layers: 12
  n_heads: 6
  max_seq_len: 512
  dropout: 0.1
  gradient_checkpointing: true

  # Rank-1 neuron pools (~40M total)
  n_qk: 8192        # Q/K shared neurons — 8192 × 384 = 3.15M
  n_v: 8192          # V neurons — 8192 × 384 = 3.15M
  n_know: 24576      # Knowledge neurons — 24576 × 384 = 9.44M
  max_k: 64

  d_space: 256
  router_dropout: 0.1

  # Hierarchical routing (2-stage)
  n_clusters_qk: 64       # 8192/64 = 128 neurons per cluster
  n_clusters_v: 64         # 8192/64 = 128
  n_clusters_know: 128     # 24576/128 = 192
  k_cluster_qk: 8          # 64 clusters → select 8 → search 1024/8192
  k_cluster_v: 8
  k_cluster_know: 8         # 128 clusters → select 8 → search 1536/24576

training:
  batch_size: 128
  gradient_accumulation_steps: 1
  num_epochs: 1
  lr: 0.00065
  weight_decay: 0.1
  warmup_ratio: 0.06
  orthogonality_weight: 0.0
  diversity_weight: 0.1
  load_balance_weight: 0.00002
  checkpoint_interval: 500
  val_interval: 500

use_amp: true
checkpoint_dir: gs://dawn-tpu-data-c4/checkpoints/dawn_spatial_r1_40M_c4_5B
log_dir: gs://dawn-tpu-data-c4/logs/dawn_spatial_r1_40M_c4_5B

# Parameter budget (~40.5M):
#   qk_neurons:    8192 × 384  =  3.15M
#   v_neurons:     8192 × 384  =  3.15M
#   know_neurons:  24576 × 384 =  9.44M
#   neuron_emb:    40960 × 256 = 10.49M
#   cluster_emb:   (64+64+128) × 256 = 0.07M  (hierarchical routing)
#   Router proj + tau:            0.40M
#   Blocks (LN×2 + O_proj) ×12:  1.79M
#   Embeddings (tok + pos):      11.92M
#   Total:                       ~40.4M
#
# Routing complexity:
#   QK: 64 cluster scores + 8×128=1024 neuron scores (vs 8192 flat)  → 7.5x speedup
#   V:  64 cluster scores + 8×128=1024 neuron scores (vs 8192 flat)  → 7.5x speedup
#   Know: 128 cluster scores + 8×192=1536 neuron scores (vs 24576 flat) → 15x speedup
