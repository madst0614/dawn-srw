# DAWN v17.1-TPU Training Config - 100M Scale, 5B tokens
# For TPU multi-device training with pretokenized .bin data
# Scaled from 40M: d_model 384→768, n_layers 12→16, neurons ~1.35x

seed: 1

data:
  bin_train: gs://dawn-tpu-data-c4/c4_train
  bin_val: gs://dawn-tpu-data-c4/c4_val.bin
  max_train_tokens: 5000000000
  max_val_tokens: 10000000
  local_cache_dir: /tmp/data

model:
  model_version: "17.1"
  d_model: 768
  n_layers: 16
  n_heads: 8
  rank: 64

  n_feature_qk: 88
  n_feature_v: 352
  top_k_feature_qk: 16
  top_k_feature_v: 16

  n_restore_qk: 88
  n_restore_v: 352
  top_k_restore_qk: 16
  top_k_restore_v: 16

  n_feature_know: 224
  n_restore_know: 224
  knowledge_rank: 64
  top_k_feature_know: 16
  top_k_restore_know: 16

  max_seq_len: 512
  dropout: 0.1
  gradient_checkpointing: true
  d_space: 256
  router_dropout: 0.1

training:
  batch_size: 512
  gradient_accumulation_steps: 1
  num_epochs: 1
  lr: 0.0005
  weight_decay: 0.1
  warmup_ratio: 0.06
  orthogonality_weight: 0.01
  diversity_weight: 0.1
  load_balance_weight: 0.0001
  entropy_weight: 0.0
  process_norm_weight: 0.0
  checkpoint_interval: 500
  val_interval: 500

use_amp: true

checkpoint_dir: gs://dawn-tpu-data-c4/checkpoints/dawn_v17_1_100M_c4_5B
log_dir: gs://dawn-tpu-data-c4/logs/dawn_v17_1_100M_c4_5B
