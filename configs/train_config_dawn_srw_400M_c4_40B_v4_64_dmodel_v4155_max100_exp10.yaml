# DAWN-SRW -- 400M d_model-matched / C4 40B / v4-64
# PATCH_ID: v4155-400M-main-max100-control-expz3
# Intent: 4.1.5.5-style max100 main run with controller stabilization,
#         stronger-but-bounded exploration pressure, and CE/grad-only collapse guard.
#
# v4-64 from-scratch variant of the v4-32 dmodel run.
# Keeps model/pool geometry identical for parameter comparability, while using
# the extra data-parallel axis to remove gradient accumulation:
#   v4-32: batch_size 512 x grad_accum 2 = effective batch 1024
#   v4-64: batch_size 1024 x grad_accum 1 = effective batch 1024
#
# With mesh_model=2 and 32 total devices, per-device batch remains 32.
# ============================================================

seed: 1

data:
  bin_train: gs://dawn-tpu-data-c4/c4_train_40B
  bin_val: gs://dawn-tpu-data-c4/c4_val.bin
  max_train_tokens: 40000000000
  max_val_tokens: 10000000
  local_cache_dir: /tmp/data

model:
  model_version: "dawn_srw"
  d_model: 2304
  n_layers: 18
  n_heads: 36
  max_seq_len: 512
  dropout: 0.0
  gradient_checkpointing: true

  d_route: 256

  n_qk: 2330
  n_v: 14640
  n_know: 29130
  # Router/dropout stability: keep routing deterministic; sparse pressure handled by tau/exploration.
  router_dropout: 0.0

training:
  batch_size: 1024
  mesh_model: 2
  mesh_data: 16
  n_chunks_qk: 1
  n_chunks_v: 1
  n_chunks_know: 4
  gradient_accumulation_steps: 1
  num_epochs: 1
  # Keep these stability/config choices when resuming; do not let old checkpoint config override them.
  restore_training_config_on_resume: false
  lr: 0.0003
  weight_decay: 0.1
  pool_weight_decay: 0.02    # decays emb and raw read/write operator norms
  warmup_ratio: 0.08
  diversity_weight: 0.1
  load_balance_weight: 0.0

  # ---- v4.1 physical constants (gate shape) ----
  sharpness: 500.0
  activation_threshold: 0.5
  activation_cutoff: 0.01
  epsilon: 1.0e-4
  max_intensity: 100.0
  scan_scale: 0.01
  scan_std_floor: 0.5

  # ---- Dead-only penalty ----
  dead_penalty_weight: 0.05
  dead_penalty_threshold: 0.01

  # ---- Explore loss (v4.1+ per-token bound) ----
  # Baseline = per-batch global-mean CE. Signal = asymmetric deviation from baseline.
  # Intent: keep max100 capacity, but control sparse pressure via bounded exploration
  # and conservative controller updates.
  exploration_weight: 0.001
  exploration_asymmetry: 10.0
  exploration_warmup_steps: 1000
  exploration_lower_bound: -0.5
  exploration_upper_bound: 2.0
  exploration_bound_eps: 1.0e-3

  # ---- Controller / exploration stabilization patch ----
  # Control LR: tau/scan are boundary actuators, router/route embeddings get milder damping.
  tau_lr_mult: 0.10
  router_scan_lr_mult: 0.10
  router_proj_lr_mult: 0.25
  route_emb_lr_mult: 0.30

  # Control grad caps: tau/scan are tight; projection/emb caps are spike safety only.
  tau_grad_clip: 0.10
  router_scan_grad_clip: 0.10
  router_proj_grad_clip: 1.00
  route_emb_grad_clip: 1.00

  # Keep routing signatures raw in forward; WD and optimizer regulate meaningful scale.
  route_emb_forward_norm: false

  # Bounded exploration: stronger final pressure than 0.05, with z-tail up to 3σ.
  exploration_dev_mode: bounded_z
  exploration_ce_clip_std: 2.0
  exploration_z_clip: 3.0
  exploration_z_tanh: true
  exploration_weighted_clip: 1.0
  dead_penalty_weighted_clip: 0.5

  # No forward tau-offset clamp unless outlier tau returns.
  tau_offset_clip: 0.0

  # ---- Collapse/snapshot guard ----
  # Stop only on hard failures. top1/active/layer_out are diagnostics, not standalone stop.
  crash_snapshot_enabled: true
  stop_on_collapse: true
  crash_snapshot_save_post: false
  crash_history_steps: 6
  crash_snapshot_save_host_batches: true
  collapse_grad_threshold: 100.0
  collapse_ce_extreme_threshold: 99.0
  collapse_ce_grad_ce_threshold: 8.0
  collapse_ce_grad_grad_threshold: 50.0
  collapse_loss_minus_ce_threshold: 10.0

  checkpoint_interval: 200
  val_interval: 200
  log_interval: 100
  log_analysis_multiplier: 10
  heavy_geometry_multiplier: 10

use_amp: true
checkpoint_dir: gs://dawn-tpu-data-c4/checkpoints/dawn_srw_400M_c4_40B_v4_64_dmodel_v4155_max100_exp20
log_dir: gs://dawn-tpu-data-c4/logs/dawn_srw_400M_c4_40B_v4_64_dmodel_v4155_max100_exp20
