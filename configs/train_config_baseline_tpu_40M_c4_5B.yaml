# Vanilla Transformer Baseline — TPU Training Config
# Conservative parameter-matched baseline for DAWN-SRW 40M @ 5B tokens
# Uses standard 4x FFN ratio: d_model=432, d_ff=1728
# Approx params with BERT uncased vocab 30522: ~40.34M
# This is slightly Transformer-favored because residual width is larger than DAWN-SRW's 384.
# Param sanity: old d384 4x ~33.21M; new d432 4x ~40.34M; DAWN-SRW target ~40.22M.

seed: 1

data:
  bin_train: gs://dawn-tpu-data-c4/c4_train_40B
  bin_val: gs://dawn-tpu-data-c4/c4_val.bin
  max_train_tokens: 5000000000
  max_val_tokens: 10000000
  local_cache_dir: /tmp/data

model:
  model_version: "baseline"
  d_model: 432
  d_ff: 1728
  n_layers: 12
  n_heads: 6
  max_seq_len: 512
  dropout: 0.0
  gradient_checkpointing: true

training:
  mesh_model: 1
  batch_size: 128
  gradient_accumulation_steps: 1
  num_epochs: 1
  lr: 0.00065
  weight_decay: 0.1
  warmup_ratio: 0.06
  orthogonality_weight: 0.0
  diversity_weight: 0.0
  load_balance_weight: 0.0
  entropy_weight: 0.0
  process_norm_weight: 0.0
  checkpoint_interval: 500
  val_interval: 500

use_amp: true

checkpoint_dir: gs://dawn-tpu-data-c4/checkpoints/baseline_40M_c4_5B_d432_4x_drop0
log_dir: gs://dawn-tpu-data-c4/logs/baseline_40M_c4_5B_d432_4x_drop0
