# DAWN-SRW v4.1.5.9 TC v04 d_select — 40M stability test
#
# Purpose:
#   - Stable 40M test for activation/intensity two-channel routing.
#   - Use model.d_select as the primary split knob.
#   - Remaining route dims are split into intensity:
#       d_intensity = d_route - d_select
#   - Keep activation/intensity settings common across attn/RST.
#   - Use only tau init as attn/RST-specific control:
#       attn tau offset init = 1.0
#       rst  tau offset init = 2.0
#   - Disable scan for this stability test.
#
# Expected files:
#   models/dawn_srw_v4159_tc_v04_dselect.py
#   scripts/train_jax_tc_v04_dselect.py
#
# Gate form:
#   relation   = cosine(h_select, emb_select)
#   z          = clip((relation - tau) / activation_width, 0, 1)
#   activation = z ** activation_power
#   intensity  = exp(intensity_beta * tanh(intensity_raw / intensity_width))
#   gate       = activation * intensity
#   out        = sum(gate * RW_i(x)) / max(sum(gate), 1.0)

seed: 1
use_amp: true

# -----------------------------------------------------------------------------
# Data
# -----------------------------------------------------------------------------
data:
  bin_train: gs://dawn-tpu-data-c4/c4_train_40B
  bin_val: gs://dawn-tpu-data-c4/c4_val.bin
  max_train_tokens: 5000000000
  max_val_tokens: 10000000
  local_cache_dir: /tmp/data

# -----------------------------------------------------------------------------
# Model shape / SRW pools
# -----------------------------------------------------------------------------
model:
  model_version: spatial-r1-v4.1.5.9

  # Backbone
  d_model: 432
  n_layers: 12
  n_heads: 6
  max_seq_len: 512

  # Route split
  # d_select is the primary knob. The rest of d_route is split into intensity.
  # Here: d_route=128, d_select=96, d_intensity=32.
  d_route: 128
  d_select: 96

  # Shared SRW pool sizes
  n_qk: 1240
  n_v: 7830
  n_know: 15570

  # Execution / regularization
  dropout: 0.0
  router_dropout: 0.0
  gradient_checkpointing: true
  fixed_depth_pool_scale: true

# -----------------------------------------------------------------------------
# Training schedule / optimizer
# -----------------------------------------------------------------------------
training:
  batch_size: 128
  gradient_accumulation_steps: 1
  restore_training_config_on_resume: false
  num_epochs: 1

  lr: 0.00065
  warmup_ratio: 0.06
  weight_decay: 0.1
  pool_weight_decay: 0.02

  # Tau-only LR dampening. Other LR multipliers stay at train_jax defaults.
  tau_lr_mult: 0.25

  # ---------------------------------------------------------------------------
  # Gate: activation selection channel
  # ---------------------------------------------------------------------------
  # activation_width is the transition-band width after tau.
  # activation_power weakens neurons inside the transition band.
  sharpness: 500.0
  activation_width: 0.075
  activation_power: 2.0
  activation_cutoff: 0.01
  epsilon: 1e-06
  max_intensity: 1000.0

  # ---------------------------------------------------------------------------
  # Gate: intensity mixture channel
  # ---------------------------------------------------------------------------
  # d_intensity is derived from model.d_route - model.d_select.
  # No intensity_route_dim key is needed in this config.
  intensity_beta: 0.5
  intensity_squash: tanh
  intensity_width: 1.0

  # ---------------------------------------------------------------------------
  # Tau initialization / scan
  # ---------------------------------------------------------------------------
  # Attn is allowed to be less sparse; RST starts more conservative.
  tau_offset_init_attn: 1.0
  tau_offset_init_rst: 2.0

  # Scan is disabled in this stable test to reduce variables.
  scan_scale: 0.0
  scan_std_floor: 0.5

  # ---------------------------------------------------------------------------
  # Auxiliary losses
  # ---------------------------------------------------------------------------
  diversity_weight: 0.1
  load_balance_weight: 0.0

  dead_penalty_weight: 0.05
  dead_penalty_threshold: 0.01

  exploration_weight: 0.001
  exploration_asymmetry: 3.0
  exploration_warmup_steps: 1000
  exploration_lower_bound: -0.5
  exploration_upper_bound: 2.0
  exploration_bound_eps: 0.001

  # ---------------------------------------------------------------------------
  # Sharding / chunking
  # ---------------------------------------------------------------------------
  n_chunks_qk: 1
  n_chunks_v: 1
  n_chunks_know: 1

  # ---------------------------------------------------------------------------
  # Diagnostics / logging / checkpoints
  # ---------------------------------------------------------------------------
  checkpoint_interval: 500
  val_interval: 500
  log_interval: 100
  log_analysis_multiplier: 5
  heavy_geometry_multiplier: 10

  route_emb_forward_norm: false
  debug_local_spikes: false
  debug_drop_compare: false

# -----------------------------------------------------------------------------
# Output paths
# -----------------------------------------------------------------------------
checkpoint_dir: gs://dawn-tpu-data-c4/checkpoints/dawn_srw_v4159_40M_tc_v04_dselect
log_dir: gs://dawn-tpu-data-c4/logs/dawn_srw_v4159_40M_tc_v04_dselect
