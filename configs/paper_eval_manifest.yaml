experiments:
  val_bin: gs://dawn-tpu-data-c4/c4_val.bin
  seq_len: 512
  # v4-32 friendly global batch. Baseline uses data-only sharding; DAWN rows
  # below set per-model mesh_model so pool sizes divide cleanly.
  batch_size: 32
  max_batches: null
  output_dir: results/paper_eval_v4_32_v_more_main_t099_20260509
  local_cache_dir: /tmp/dawn_c4_cache

  baseline:
    - name: tf_40m
      config: configs/train_config_baseline_tpu_40M_c4_5B.yaml
