# DAWN Spatial-R1 v3.7 -- Sense + Direct Emit, 40M Scale, 5B tokens
# emb[N,64] sense + w[N,384] emit. threshold_gate + emit_direct(gate@w).

seed: 1

data:
  bin_train: gs://dawn-tpu-data-c4/c4_train
  bin_val: gs://dawn-tpu-data-c4/c4_val.bin
  max_train_tokens: 5000000000
  max_val_tokens: 10000000
  local_cache_dir: /tmp/data

model:
  model_version: "spatial-r1-v3.7.0"
  d_model: 384
  n_layers: 12
  n_heads: 6
  max_seq_len: 512
  dropout: 0.1
  gradient_checkpointing: true

  d_bottleneck: 64
  n_qk: 2500
  n_v: 4000
  n_know: 52500
  max_k_qk: 250
  max_k_v: 400
  max_k_know: 3780
  router_dropout: 0.1

training:
  batch_size: 128
  gradient_accumulation_steps: 1
  num_epochs: 1
  lr: 0.00065
  weight_decay: 0.1
  warmup_ratio: 0.06
  diversity_weight: 0.1
  load_balance_weight: 0.00002
  checkpoint_interval: 500
  val_interval: 500

use_amp: true
checkpoint_dir: gs://dawn-tpu-data-c4/checkpoints/dawn_spatial_r1v3.7_40M_c4_5B
log_dir: gs://dawn-tpu-data-c4/logs/dawn_spatial_r1v3.7_40M_c4_5B

# Parameter budget (~40.0M):
#   QK:   2500 x (64+384)  = 1.12M
#   V:    4000 x (64+384)  = 1.79M
#   Know: 52500 x (64+384) = 23.52M
#   Router proj+tau:          ~0.1M
#   Blocks (LN x2 + O) x12: 1.79M
#   Embeddings (tok+pos):   11.72M
#   Total:                  ~40.0M
