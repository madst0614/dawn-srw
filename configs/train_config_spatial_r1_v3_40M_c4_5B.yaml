# DAWN Spatial-R1 v3.2 -- Sense/Emit Split + Full Matmul, 40M Scale, 5B tokens
# Each neuron: emb[D] (sense) + w[D] (emit). Dense matmul, no gather.
# Neuron counts halved vs v2 to maintain param budget with 2 vectors/neuron.

seed: 1

data:
  bin_train: gs://dawn-tpu-data-c4/c4_train
  bin_val: gs://dawn-tpu-data-c4/c4_val.bin
  max_train_tokens: 5000000000
  max_val_tokens: 10000000
  local_cache_dir: /tmp/data

model:
  model_version: "spatial-r1-v3.2.0"
  d_model: 384
  n_layers: 12
  n_heads: 6
  max_seq_len: 512
  dropout: 0.1
  gradient_checkpointing: true

  n_qk: 1570
  n_v: 2620
  n_know: 21000
  max_k_qk: 157
  max_k_v: 262
  max_k_know: 1536
  router_dropout: 0.1

training:
  batch_size: 128
  gradient_accumulation_steps: 1
  num_epochs: 1
  lr: 0.00065
  weight_decay: 0.1
  warmup_ratio: 0.06
  diversity_weight: 0.1
  load_balance_weight: 0.00002
  checkpoint_interval: 500
  val_interval: 500

use_amp: true
checkpoint_dir: gs://dawn-tpu-data-c4/checkpoints/dawn_spatial_r1v3.2_40M_c4_5B
log_dir: gs://dawn-tpu-data-c4/logs/dawn_spatial_r1v3.2_40M_c4_5B

# Parameter budget (~32.9M):
#   qk: 1570 x 384 x 2 (emb+w)  = 1.21M
#   v:  2620 x 384 x 2           = 2.01M
#   know: 21000 x 384 x 2        = 16.13M
#   Router tau:                     ~0.003M
#   Blocks (LN x2 + O_proj) x12: 1.79M
#   Embeddings (tok + pos):      11.72M
#   Total:                       ~32.9M
