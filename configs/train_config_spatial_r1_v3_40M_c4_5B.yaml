# DAWN Spatial-R1 v3 -- Map-Based Routing, 40M Scale, 5B tokens
# Cell map lookup replaces distance brute-force routing.
# No candidates_multiplier -- cell size determines candidate count.

seed: 1

data:
  bin_train: gs://dawn-tpu-data-c4/c4_train
  bin_val: gs://dawn-tpu-data-c4/c4_val.bin
  max_train_tokens: 5000000000
  max_val_tokens: 10000000
  local_cache_dir: /tmp/data

model:
  model_version: "spatial-r1-v3.0.0"
  d_model: 384
  n_layers: 12
  n_heads: 6
  max_seq_len: 512
  dropout: 0.1
  gradient_checkpointing: true

  pos_dim: 2
  n_cells_per_side: 32
  map_rebuild_interval: 100
  chunk_size: 16

  n_qk: 3140
  n_v: 5240
  n_know: 42000
  max_k_qk: 157
  max_k_v: 262
  max_k_know: 1536
  router_dropout: 0.1

training:
  batch_size: 128
  gradient_accumulation_steps: 1
  num_epochs: 1
  lr: 0.00065
  weight_decay: 0.1
  warmup_ratio: 0.06
  diversity_weight: 0.1
  load_balance_weight: 0.00002
  pos_loss_weight: 0.01
  checkpoint_interval: 500
  val_interval: 500

use_amp: true
checkpoint_dir: gs://dawn-tpu-data-c4/checkpoints/dawn_spatial_r1v3_40M_c4_5B
log_dir: gs://dawn-tpu-data-c4/logs/dawn_spatial_r1v3_40M_c4_5B
