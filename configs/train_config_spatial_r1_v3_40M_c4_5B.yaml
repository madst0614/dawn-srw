# DAWN Spatial-R1 v3.8 -- Sense-Read-Write, 40M Scale, 5B tokens
# emb[64] sense + w_read[384] + w_write[384]. x participates in output.

seed: 1

data:
  bin_train: gs://dawn-tpu-data-c4/c4_train
  bin_val: gs://dawn-tpu-data-c4/c4_val.bin
  max_train_tokens: 5000000000
  max_val_tokens: 10000000
  local_cache_dir: /tmp/data

model:
  model_version: "spatial-r1-v3.8.1"
  d_model: 384
  n_layers: 12
  n_heads: 6
  max_seq_len: 512
  dropout: 0.1
  gradient_checkpointing: true

  d_bottleneck: 64
  n_qk: 1700
  n_v: 2800
  n_know: 27200
  max_k_qk: 170
  max_k_v: 280
  max_k_know: 1960
  router_dropout: 0.1

training:
  batch_size: 128
  gradient_accumulation_steps: 1
  num_epochs: 1
  lr: 0.00065
  weight_decay: 0.1
  warmup_ratio: 0.06
  diversity_weight: 0.1
  load_balance_weight: 0.00002
  checkpoint_interval: 500
  val_interval: 500

use_amp: true
checkpoint_dir: gs://dawn-tpu-data-c4/checkpoints/dawn_spatial_r1v3.8_40M_c4_5B
log_dir: gs://dawn-tpu-data-c4/logs/dawn_spatial_r1v3.8_40M_c4_5B

# Parameter budget (~40M):
#   QK:   1700 x (64+384+384) = 1.41M
#   V:    2800 x (64+384+384) = 2.33M
#   Know: 27200 x (64+384+384) = 22.63M
#   Router proj+tau: ~0.1M
#   Blocks (LN x2 + O) x12: 1.79M
#   Embeddings: 11.72M
#   Total: ~40.0M
