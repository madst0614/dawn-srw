# DAWN Spatial-R1 v4.1.5.3 -- factorized read/write signature routing
#
# Archived experiment. To reproduce it, move/re-register:
#   models/legacy/dawn_spatial_v4153_factorized_routing_exp.py
#
# This variant removes learned route tags and routes through separate
# read/write operator-signature factors:
#   tag_dim=0, read_sig_dim=64, write_sig_dim=64, d_route=128
#   routing_type=factorized

seed: 1

data:
  bin_train: gs://dawn-tpu-data-c4/c4_train_40B
  bin_val: gs://dawn-tpu-data-c4/c4_val.bin
  max_train_tokens: 5000000000
  max_val_tokens: 10000000
  local_cache_dir: /tmp/data

model:
  model_version: "spatial-r1-v4.1.5.3"
  d_model: 384
  n_layers: 12
  n_heads: 6
  max_seq_len: 512
  dropout: 0.0
  gradient_checkpointing: true

  d_route: 128
  n_qk: 1580
  n_v: 2600
  n_know: 25200
  router_dropout: 0.02

  tag_dim: 0
  read_sig_dim: 64
  write_sig_dim: 64
  routing_type: "factorized"
  route_tag_weight: 0.0
  route_read_weight: 1.0
  route_write_weight: 1.0

training:
  batch_size: 128
  gradient_accumulation_steps: 1
  num_epochs: 1
  lr: 0.00065
  weight_decay: 0.1
  pool_weight_decay: 0.02
  warmup_ratio: 0.06
  diversity_weight: 0.1
  load_balance_weight: 0.0

  sharpness: 500.0
  activation_threshold: 0.5
  activation_cutoff: 0.01
  epsilon: 1.0e-4
  max_intensity: 100.0
  scan_scale: 0.01
  scan_std_floor: 0.5

  dead_penalty_weight: 0.05
  dead_penalty_threshold: 0.01

  exploration_weight: 0.001
  exploration_asymmetry: 1.5
  exploration_warmup_steps: 1000
  exploration_lower_bound: -0.5
  exploration_upper_bound: 2.0
  exploration_bound_eps: 1.0e-3

  n_chunks_know: 1
  n_chunks_qk: 1
  n_chunks_v: 1
  checkpoint_interval: 500
  val_interval: 500
  log_interval: 100
  log_analysis_multiplier: 5

use_amp: true
checkpoint_dir: gs://dawn-tpu-data-c4/checkpoints/dawn_spatial_r1v4.1.5.3_40M_c4_5B_tag0_sigr64_sigw64_factorized
log_dir: gs://dawn-tpu-data-c4/logs/dawn_spatial_r1v4.1.5.3_40M_c4_5B_tag0_sigr64_sigw64_factorized
