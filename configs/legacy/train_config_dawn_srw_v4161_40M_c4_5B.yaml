# DAWN-SRW v4.1.6.1 DirectTau + CB1A - 40M run config
#
# v4.1.6.1 keeps the v4.1.6.0 DirectTau forward rule unchanged:
#   rho = cosine(q_select, signature)
#   tau = sigmoid(raw_tau)
#   gate = relu(rho - tau) * intensity
#
# CB1A is auxiliary-only. It computes boundary gaps inside SRW while rho/tau
# are already available, then train_jax applies CE-conditioned weights.

seed: 1

data:
  bin_train: gs://dawn-tpu-data-c4/c4_train_40B
  bin_val: gs://dawn-tpu-data-c4/c4_val.bin
  max_train_tokens: 5000000000
  max_val_tokens: 10000000
  local_cache_dir: /tmp/data

model:
  model_version: spatial-r1-v4.1.6.1

  # Backbone
  d_model: 432
  n_layers: 12
  n_heads: 6
  max_seq_len: 512

  # Route split
  d_route: 128
  d_select: 96        # remaining 32 dims are intensity dims

  # Shared SRW pools
  n_qk: 1240
  n_v: 7830
  n_know: 15570

  # Execution / regularization
  dropout: 0.0
  router_dropout: 0.0
  gradient_checkpointing: true

training:
  # Batch / schedule
  batch_size: 128
  gradient_accumulation_steps: 1
  restore_training_config_on_resume: false
  num_epochs: 1

  # Optimizer
  lr: 0.00065
  warmup_ratio: 0.06
  weight_decay: 0.1
  pool_weight_decay: 0.02
  tau_lr_mult: 0.1
  tau_grad_clip: 1.0
  router_proj_grad_clip: 2.0

  # DirectTau Angular Select / Intensity
  tau_init_attn_qk: 0.001
  tau_init_attn_v: 0.10
  tau_init_rst: 0.20
  intensity_beta: 0.5

  # Auxiliary losses
  diversity_weight: 0.1
  load_balance_weight: 0.0
  dead_penalty_weight: 0.005
  dead_exposure_target: 0.1
  dead_penalty_qk_weight: 1.0
  dead_penalty_v_weight: 1.0
  dead_penalty_rst_weight: 0.5

  # CE-conditioned Boundary-1 Audition (CB1A)
  cb1a_enabled: true
  cb1a_weight: 1.0
  cb1a_qk_weight: 0.1
  cb1a_v_weight: 0.8
  cb1a_rst_weight: 1.5
  cb1a_qk_challenge_weight: 1.0
  cb1a_qk_prune_weight: 1.1
  cb1a_v_challenge_weight: 1.0
  cb1a_v_prune_weight: 1.2
  cb1a_rst_challenge_weight: 1.0
  cb1a_rst_prune_weight: 2.0
  cb1a_tau_stopgrad: true
  cb1a_anchor_stopgrad: true
  cb1a_forward_influence: false
  cb1a_ce_mode: sigmoid_z
  cb1a_eps: 1.0e-8

  # Sharding / chunking
  n_chunks_qk: 1
  n_chunks_v: 1
  n_chunks_know: 1

  # Logging / diagnostics / checkpoints
  checkpoint_interval: 500
  val_interval: 500
  log_interval: 100
  log_analysis_multiplier: 5
  heavy_geometry_multiplier: 10

checkpoint_dir: gs://dawn-tpu-data-c4/checkpoints/dawn_srw_v4161_40M_c4_5B_cb1a
