# DAWN Spatial-R1 v3.9.4 Training Config - 1B Scale - v4-32 Pod
# Same model as v4-128 config, adjusted mesh/batch for 16 chips
# Global batch: 512 × acc 4 = effective 2048 (matches v4-128)
# Checkpoint compatible with v4-128 config for seamless migration

seed: 1

data:
  bin_train: gs://dawn-tpu-data-c4/c4_train_40B
  bin_val: gs://dawn-tpu-data-c4/c4_val.bin
  max_train_tokens: 40000000000
  max_val_tokens: 10000000
  local_cache_dir: /tmp/data

model:
  model_version: "spatial-r1-v3.9.4"
  d_model: 2048
  n_layers: 18
  n_heads: 16
  d_route: 384

  n_know: 158800
  n_qk: 9900
  n_v: 16100

  max_seq_len: 512
  dropout: 0.1
  gradient_checkpointing: true
  router_dropout: 0.1

training:
  batch_size: 256
  gradient_accumulation_steps: 8
  mesh_model: 4
  mesh_data: 4
  num_epochs: 1
  lr: 0.0002
  weight_decay: 0.1
  warmup_ratio: 0.06
  orthogonality_weight: 0.01
  diversity_weight: 0.1
  load_balance_weight: 0.1
  checkpoint_interval: 200
  val_interval: 200

use_amp: true
checkpoint_dir: gs://dawn-tpu-data-c4/checkpoints/dawn_spatial_r1v3.9.4_1B_c4_40B
log_dir: gs://dawn-tpu-data-c4/logs/dawn_spatial_r1v3.9.4_1B_c4_40B
