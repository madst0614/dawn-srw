# DAWN Spatial-R1 v4.1.5.2 -- d_route-only tag routing
#
# Sister of train_config_spatial_r1_v4_1_40M_c4_5B.yaml.
# train_jax.py maps model_version: "spatial-r1-v4.1.5.2" to:
#   models/dawn_spatial_v4152.py
#
# This keeps the baseline v4.1 training hyperparameters fixed while using
# the d_route-only route convention:
#   scan = scan_scale * tanh(scan_bias)
#   tau = s_mean + tau_offset * s_std - scan / max(s_std, scan_std_floor)
#
# v4.1.5.2 train_jax default:
#   route_width=d_route
#
# Route interpretation:
#   h supplies token/context magnitude and direction;
#   route keeps learned tag norm as the routing degree of freedom.
#
# Only d_route is configured here; train_jax derives the internal split.
# ============================================================

seed: 1

data:
  bin_train: gs://dawn-tpu-data-c4/c4_train_40B
  bin_val: gs://dawn-tpu-data-c4/c4_val.bin
  max_train_tokens: 5000000000
  max_val_tokens: 10000000
  local_cache_dir: /tmp/data

model:
  model_version: "spatial-r1-v4.1.5.2"
  d_model: 384
  n_layers: 12
  n_heads: 6
  max_seq_len: 512
  # Mild residual/attn dropout -- helps break co-adaptation without
  # drowning the signal. 40M@5B has no overfit pressure.
  dropout: 0.0
  gradient_checkpointing: true

  d_route: 128
  n_qk: 1480
  n_v: 5230
  n_know: 22660
  # h-level dropout. Scores = h . emb, so dropping h dims is
  # equivalent to stochastically dimming all neuron scores along
  # that axis -- horizontal search (area-shift) complement to
  # tau's vertical search (water-level).
  router_dropout: 0.02

training:
  batch_size: 128
  gradient_accumulation_steps: 1
  num_epochs: 1
  lr: 0.00065
  weight_decay: 0.1
  pool_weight_decay: 0.02    # v4.1.5.2 decays free-norm emb/tag; RW is WD-excluded
  warmup_ratio: 0.06
  diversity_weight: 0.1
  load_balance_weight: 0.0

  # ---- v4.1 physical constants (gate shape) ----
  sharpness: 500.0
  activation_threshold: 0.5
  activation_cutoff: 0.01
  epsilon: 1.0e-4
  max_intensity: 100.0
  scan_scale: 0.01
  scan_std_floor: 0.5

  # ---- Dead-only penalty ----
  dead_penalty_weight: 0.05
  dead_penalty_threshold: 0.01

  # ---- Explore loss (v4.1+ per-token bound) ----
  # Baseline = per-batch global-mean CE (no EMA, stateless, zero-sum).
  # Signal = asymmetric deviation from baseline.
  # Bounds apply per-element (per-token x per-layer x per-route):
  #   tau <= LOWER + BOUND_EPS  AND  signal > 0  ->  off
  #   tau >= UPPER - BOUND_EPS  AND  signal < 0  ->  off
  #   otherwise                                  ->  normal signal
  # tau itself is NOT clipped -- only the explore loss is bounded.
  # CE can push tau outside the bounds if it really needs to.
  exploration_weight: 0.001        # lambda: overall strength
  exploration_asymmetry: 1.5       # easy-token push scale (symmetric=1.0)
  exploration_warmup_steps: 1000   # loss off until this step
  exploration_lower_bound: -0.5    # down-push bound
  exploration_upper_bound: 2.0     # up-push bound
  exploration_bound_eps: 1.0e-3    # tolerance near bounds

  n_chunks_know: 1
  n_chunks_qk: 1
  n_chunks_v: 1
  checkpoint_interval: 500
  val_interval: 500
  # ---- 2-tier log cadence (step units) ----
  log_interval: 100
  log_analysis_multiplier: 5
  heavy_geometry_multiplier: 10

use_amp: true
checkpoint_dir: gs://dawn-tpu-data-c4/checkpoints/dawn_spatial_r1v4.1.5.2_40M_c4_5B_tag128_balanced
log_dir: gs://dawn-tpu-data-c4/logs/dawn_spatial_r1v4.1.5.2_40M_c4_5B_tag128_balanced
