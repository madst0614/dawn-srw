# DAWN Spatial-R1 v4.1+ -- two-stage gate + bounded explore + mild dropout
#
# ============================================================
# Changes from v4.1 baseline:
#   1. Explore loss: per-token/layer/route bound off.
#      Replaces pool-mean block with [LOWER, UPPER] range.
#      Inside bounds -> normal signal; outside -> off (per-element).
#   2. Explore warmup: loss disabled for the first N steps so
#      W_sense has time to settle before tau exploration kicks in.
#   3. Mild dropout for co-adaptation regularisation (residual + h).
#      40M @ 5B tokens is well under the overfit threshold, so
#      0.05 is mostly about preventing rigid co-activation patterns
#      and introducing gentle exploration in projection space.
# ============================================================

seed: 1

data:
  bin_train: gs://dawn-tpu-data-c4/c4_train_40B
  bin_val: gs://dawn-tpu-data-c4/c4_val.bin
  max_train_tokens: 5000000000
  max_val_tokens: 10000000
  local_cache_dir: /tmp/data

model:
  model_version: "spatial-r1-v4.1"
  d_model: 384
  n_layers: 12
  n_heads: 6
  max_seq_len: 512
  # Mild residual/attn dropout -- helps break co-adaptation without
  # drowning the signal. 40M@5B has no overfit pressure.
  dropout: 0.05
  gradient_checkpointing: true

  d_route: 128
  n_qk: 1580
  n_v: 2600
  n_know: 25200
  # h-level dropout. Scores = h . emb, so dropping h dims is
  # equivalent to stochastically dimming all neuron scores along
  # that axis -- horizontal search (area-shift) complement to
  # tau's vertical search (water-level).
  router_dropout: 0.02

training:
  batch_size: 128
  gradient_accumulation_steps: 1
  num_epochs: 1
  lr: 0.00065
  weight_decay: 0.1
  pool_weight_decay: 0.02    # free-norm pool params (emb/read/write) softer WD
  warmup_ratio: 0.06
  diversity_weight: 0.1
  load_balance_weight: 0.0

  # ---- v4.1 physical constants (gate shape) ----
  sharpness: 500.0
  activation_threshold: 0.5
  activation_cutoff: 0.01
  epsilon: 1.0e-4
  max_intensity: 10.0

  # ---- Dead-only penalty ----
  dead_penalty_weight: 0.05
  dead_penalty_threshold: 0.01

  # ---- Explore loss (v4.1+ per-token bound) ----
  # Baseline = per-batch global-mean CE (no EMA, stateless, zero-sum).
  # Signal = asymmetric deviation from baseline.
  # Bounds apply per-element (per-token x per-layer x per-route):
  #   tau <= LOWER + BOUND_EPS  AND  signal > 0  ->  off
  #   tau >= UPPER - BOUND_EPS  AND  signal < 0  ->  off
  #   otherwise                                  ->  normal signal
  # tau itself is NOT clipped -- only the explore loss is bounded.
  # CE can push tau outside the bounds if it really needs to.
  exploration_weight: 0.001        # lambda: overall strength
  exploration_asymmetry: 1.0       # easy-token push scale (symmetric=1.0)
  exploration_warmup_steps: 5000   # loss off until this step
  exploration_lower_bound: -0.5    # down-push bound
  exploration_upper_bound: 2.0     # up-push bound
  exploration_bound_eps: 1.0e-3    # tolerance near bounds

  n_chunks_know: 1
  n_chunks_qk: 1
  n_chunks_v: 1
  checkpoint_interval: 500
  val_interval: 500

use_amp: true
checkpoint_dir: gs://dawn-tpu-data-c4/checkpoints/dawn_spatial_r1v4.1_40M_c4_5B
log_dir: gs://dawn-tpu-data-c4/logs/dawn_spatial_r1v4.1_40M_c4_5B
