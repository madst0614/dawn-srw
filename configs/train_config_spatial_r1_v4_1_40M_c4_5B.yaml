# DAWN Spatial-R1 v4.1 -- two-stage gate (activation × intensity)
#
# Gate structure:
#   margin        = (score - tau) - ACTIVATION_THRESHOLD
#   activation    = sigmoid(SHARPNESS · margin)                (near-binary)
#   active_margin = max(margin - ACTIVATION_CUTOFF, 0)
#   intensity     = EPSILON + min(active_margin, MAX_INTENSITY) (linear)
#   gate          = activation × intensity
#   den           = max(Σ intensity, 1.0)
#
# Static tau: tau = s_mean + tau_offset · s_std (dynamic shift removed).
# Embedding forward-normalised (unit) so neurons = pure direction.
# Dead threshold raised to 0.01 for the new gate scale.
#
# Projection-level dropouts kept at 0.0 (same rationale as v4.0.5/6).

seed: 1

data:
  bin_train: gs://dawn-tpu-data-c4/c4_train_40B
  bin_val: gs://dawn-tpu-data-c4/c4_val.bin
  max_train_tokens: 5000000000
  max_val_tokens: 10000000
  local_cache_dir: /tmp/data

model:
  model_version: "spatial-r1-v4.1"
  d_model: 384
  n_layers: 12
  n_heads: 6
  max_seq_len: 512
  dropout: 0.0              # emb / attn-softmax / attn-out / know-out
  gradient_checkpointing: true

  d_route: 128
  n_qk: 1580
  n_v: 2600
  n_know: 25200
  router_dropout: 0.0       # proj_attn / proj_know

training:
  batch_size: 128
  gradient_accumulation_steps: 1
  num_epochs: 1
  lr: 0.00065
  weight_decay: 0.1
  warmup_ratio: 0.06
  diversity_weight: 0.1
  load_balance_weight: 0.0
  # v4.1 physical constants (match module-level defaults; overridable).
  sharpness: 500.0
  activation_threshold: 0.5
  activation_cutoff: 0.01
  epsilon: 1.0e-4
  max_intensity: 10.0
  # Dead-only penalty (threshold bumped from 1e-4 → 0.01 for v4.1 scale).
  dead_penalty_weight: 0.05
  dead_penalty_threshold: 0.01
  # v4.1 RPE-style exploration loss. Baseline = per-step batch-global
  # CE mean (no EMA). Signal = per-token deviation from baseline;
  # `asymmetry` scales the easy-token branch.  A downward cap in the
  # training step zeroes the down-push whenever the per-pool mean
  # tau_offset is ≤ 0 — tau can only drop below 0 when every pool
  # had positive mean already.  Combined with a small asymmetry this
  # gives faint, bounded exploration.  0 weight disables the loss.
  exploration_weight: 0.001       # λ
  exploration_asymmetry: 0.1      # easy-token push scale (symmetric=1.0)
  n_chunks_know: 1
  n_chunks_qk: 1
  n_chunks_v: 1
  checkpoint_interval: 500
  val_interval: 500

use_amp: true
checkpoint_dir: gs://dawn-tpu-data-c4/checkpoints/dawn_spatial_r1v4.1_40M_c4_5B
log_dir: gs://dawn-tpu-data-c4/logs/dawn_spatial_r1v4.1_40M_c4_5B
