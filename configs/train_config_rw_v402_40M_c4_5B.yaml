# DAWN Read-Write v4.0.2 -- direct read routing, Q/K split
# No emb, no proj. score = x @ read_unit.T
# Separate Q/K pools. Separate tau per role.

seed: 1

data:
  bin_train: gs://dawn-tpu-data-c4/c4_train_40B
  bin_val: gs://dawn-tpu-data-c4/c4_val.bin
  max_train_tokens: 5000000000
  max_val_tokens: 10000000
  local_cache_dir: /tmp/data

model:
  model_version: "rw-v4.0.2"
  d_model: 384
  n_layers: 12
  n_heads: 6
  max_seq_len: 512
  dropout: 0.1
  gradient_checkpointing: true

  n_q: 790
  n_k: 790
  n_v: 2600
  n_know: 25200

training:
  batch_size: 128
  gradient_accumulation_steps: 1
  num_epochs: 1
  lr: 0.00065
  weight_decay: 0.1
  warmup_ratio: 0.06
  diversity_weight: 0.1
  load_balance_weight: 0.1
  n_chunks_q: 1
  n_chunks_k: 1
  n_chunks_v: 1
  n_chunks_know: 1
  checkpoint_interval: 500
  val_interval: 500

use_amp: true
checkpoint_dir: gs://dawn-tpu-data-c4/checkpoints/dawn_rw_v402_40M_c4_5B
log_dir: gs://dawn-tpu-data-c4/logs/dawn_rw_v402_40M_c4_5B
